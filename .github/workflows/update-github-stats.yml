name: Update GitHub Stats

on:
  schedule:
    - cron: "0 3 1 * *"   # 1st of each month at 03:00 UTC
  workflow_dispatch: {}     # allow manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate stats
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_USERNAME: Purushothaman-natarajan
        run: node scripts/fetch-github-stats.mjs

      - name: Commit updated stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/github-stats.json
          git diff --staged --quiet || git commit -m "chore: refresh github-stats.json [skip ci]"
          git push
